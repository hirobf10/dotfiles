name: Validate Dotfiles

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'home/.chezmoiignore'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15, macos-26]
        environment: [work, personal]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Test one-liner setup
      run: |
        # Run the one-liner command
        sh -c "$(curl -fsLS get.chezmoi.io)" -- init --apply --promptString "Git email address=test@example.com" --promptString "Git user name=test" --promptString "Environment (work/personal)=${{ matrix.environment }}" hirobf10
    
    - name: Verify
      run: |
        failed=0
        check() {
          if eval "$1" >/dev/null 2>&1; then
            echo "✅ $2"
          else
            echo "❌ $2"
            failed=1
          fi
        }

        echo "=== Verifying dotfiles ==="
        check 'test -f ~/.gitconfig' "~/.gitconfig"
        check 'test -f ~/.zshrc' "~/.zshrc"

        echo -e "\n=== Verifying git config ==="
        check 'grep -q "name = test" ~/.gitconfig' "Git user name configured"
        check 'grep -q "email = test@example.com" ~/.gitconfig' "Git email configured"

        echo -e "\n=== Verifying tools ==="
        check 'command -v brew' "brew installed"
        check 'command -v chezmoi' "chezmoi installed"
        check 'command -v mise' "mise installed"
        check 'test -x ~/.local/bin/uv' "uv installed"
        check 'mise which node' "node via mise"
        check 'mise which terraform' "terraform via mise"

        if [ "${{ matrix.environment }}" = "work" ]; then
          echo -e "\n=== Verifying work tools ==="
          check 'command -v tkn' "tkn installed"
          check 'test -x ~/.google-cloud-sdk/bin/gcloud' "gcloud installed"
          check 'mise which spanner-cli' "spanner-cli via mise"
        else
          echo -e "\n=== Verifying work tools are absent ==="
          check '! command -v tkn' "tkn not installed"
          check '! test -x ~/.google-cloud-sdk/bin/gcloud' "gcloud not installed"
          check '! mise which spanner-cli' "spanner-cli not managed"
        fi

        echo -e "\n=== Verifying Brewfile is fully satisfied ==="
        if brew bundle check --verbose --file ~/Brewfile; then
          echo "✅ brew bundle check"
        else
          echo "❌ brew bundle check"
          failed=1
        fi

        exit "$failed"
