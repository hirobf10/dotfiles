# herdr configuration (defaults otherwise; see `herdr --default-config`)

[keys]
# Switch workspaces directly (tabs stay on the default prefix+1..9)
switch_workspace = "prefix+shift+1..9"

# Open the git-aware file viewer (herdr-file-viewer plugin) in a split pane
[[keys.command]]
key = "prefix+f"
type = "shell"
command = "herdr plugin action invoke open-file-viewer --plugin herdr-file-viewer"

# lazygit をモーダル popup で開く(フォーカス中ペインの cwd のリポジトリ。閉じるとレイアウトは元のまま)
[[keys.command]]
key = "prefix+t"
type = "popup"
command = "lazygit"
width = "80%"
height = "80%"

# ghq のリポジトリを fzf で選んで新しいワークスペースで開く
[[keys.command]]
key = "prefix+shift+o"
type = "popup"
command = "sh ~/.config/herdr/scripts/ghq-workspace.sh"
width = "60%"
height = "60%"

[ui]
show_agent_labels_on_pane_borders = false
# 新規タブの名前入力プロンプトを省略(リネームは prefix+shift+t)
prompt_new_tab_name = false

# Claude Code のペインはターミナルタイトル(作業内容)をサイドバーに表示
agent_panel_sort = "spaces"
[ui.sidebar.agents.rows_by_agent]
claude = [["state_icon", "workspace", "tab"], ["terminal_title_stripped"], ["agent"]]

[ui.toast]
delivery = "herdr"

[experimental]
# prefix モード中は英数入力に自動切替(IME が日本語のままキーが効かない対策)
switch_ascii_input_source_in_prefix = true
# エージェントが隠すカーソルを IME 変換位置のために強制表示(claude/codex のペインのみ)
reveal_hidden_cursor_for_cjk_ime = true
cjk_ime_agents = ["claude", "codex"]
